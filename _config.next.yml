# ===============================================================
# NexT Theme Configuration — 只想睡大觉
# 风格: 接近 typography 极简风
# ===============================================================

# Scheme: Gemini (双栏)
scheme: Gemini

# Dark Mode
darkmode: false

# Favicon
favicon:
  small: /images/favicon.png
  medium: /images/favicon.png

# Menu
menu:
  home: / || fa fa-home
  posts: /posts/ || fa fa-feather
  about: /about/ || fa fa-user
  tags: /tags/ || fa fa-tags
  archives: /archives/ || fa fa-archive

menu_settings:
  icons: true
  badges: false

# ---------------------------------------------------------------
# Sidebar — 左侧，typography 风格
# ---------------------------------------------------------------
sidebar:
  position: left
  width_expanded: 240
  width_dual_column: 200
  display: post
  padding: 18
  offset: 12

avatar:
  url: #/images/avatar.jpg
  rounded: false
  rotated: false

site_state: false

# Social Links
social:
  GitHub: https://github.com/Xylon221 || fab fa-github

social_icons:
  enable: true
  icons_only: false
  transition: false

# Table of Contents
toc:
  enable: true
  number: false
  wrap: false
  expand_all: false
  max_depth: 4

# ---------------------------------------------------------------
# Footer
# ---------------------------------------------------------------
footer:
  since: 2026
  icon:
    name: fa fa-feather
    animated: false
    color: "#999590"

# ---------------------------------------------------------------
# Post Settings
# ---------------------------------------------------------------
excerpt_description: true
read_more_btn: true

post_meta:
  item_text: true
  created_at: true
  updated_at:
    enable: false
    another_day: true
  categories: true

tag_icon: true

reward_settings:
  enable: false

# ---------------------------------------------------------------
# Font Settings — 中文字体优先
# ---------------------------------------------------------------
font:
  enable: true
  host: https://fonts.googleapis.com
  global:
    external: true
    family: Noto Serif SC
    size: 1.0625
  title:
    external: true
    family: Noto Serif SC
    size: 1.125
  headings:
    external: true
    family: Noto Serif SC
    size: 1.125
  posts:
    external: true
    family: Noto Serif SC
  codes:
    external: true
    family: JetBrains Mono
    size: 0.875

# ---------------------------------------------------------------
# Text & Layout
# ---------------------------------------------------------------
text_align:
  desktop: justify
  mobile: justify

mobile_layout_economy: false

theme_color:
  light: "#fff"
  dark: "#222"

# ---------------------------------------------------------------
# Code Block — 简洁
# ---------------------------------------------------------------
codeblock:
  theme:
    light: default
    dark: stackoverflow-dark
  copy_button:
    enable: true
    style: flat
  fold:
    enable: false
  language: true

back2top:
  enable: true
  sidebar: false
  scrollpercent: false

# ---------------------------------------------------------------
# Misc
# ---------------------------------------------------------------
pangu: true

mediumzoom: false
fancybox: true

lazyload: true

creative_commons:
  license: by-nc-sa
  size: small
  sidebar: false
  post: true
  language: deed.zh

# ---------------------------------------------------------------
# Animation — 快速淡入
# ---------------------------------------------------------------
motion:
  enable: true
  async: true
  duration: 80
  transition:
    menu_item: fadeIn
    post_block: fadeIn
    post_header: fadeIn
    post_body: fadeIn
    coll_header: fadeIn
    sidebar: fadeIn

# ---------------------------------------------------------------
# Local Search
# ---------------------------------------------------------------
local_search:
  enable: false

# ---------------------------------------------------------------
# Math — MathJax
# ---------------------------------------------------------------
math:
  every_page: false
  mathjax:
    enable: true

# ---------------------------------------------------------------
# Comments — Gitalk
# ---------------------------------------------------------------
comments:
  style: tabs
  active: gitalk
  storage: true
  lazyload: false

gitalk:
  enable: true
  github_id: Xylon221
  repo: xylon221.github.io
  client_id: Ov23lim4tiqKfiBn80XF
  client_secret: 8ff7df6197d0ee163a76fe82065844ceace858f1
  admin_user: Xylon221
  distraction_free_mode: true
  language: zh-CN
  proxy:

# ---------------------------------------------------------------
# Custom Files
# ---------------------------------------------------------------
custom_file_path:
  style: source/_data/styles.styl
